name: e2e

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:


jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python
        with:
          python-version: '3.12'
      - name: run e2e tests
        run: ./scripts/run-e2e-tests
