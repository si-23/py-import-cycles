name: qa

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:


jobs:
  all-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1
