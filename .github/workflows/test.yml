name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:


jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python
        with:
          python-version: '3.12'
      - name: run pytest
        run: uv run pytest .
